name: Activity Bot

on:
  schedule:
    - cron: "23 5 * * *"
    - cron: "41 11 * * *"
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Random activity
        run: |
          CHANCE=$((RANDOM % 100))

          if [ "$CHANCE" -lt 60 ]; then
            echo "Skipping activity this run"
            exit 0
          fi

          git config --global user.name "Matthew Adlaird"
          git config --global user.email "YOUR_GITHUB_EMAIL"

          MESSAGES=(
            "update docs"
            "minor fix"
            "refactor"
            "cleanup"
            "maintenance"
            "small improvement"
          )

          MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

          echo "$(date)" > activity.log

          git add activity.log

          git commit -m "$MSG" || exit 0

          git push
