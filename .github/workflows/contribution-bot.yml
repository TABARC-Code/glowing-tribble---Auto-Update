- name: Activity Bot
  run: |
    CHANCE=$((RANDOM % 100))

    if [ "$CHANCE" -lt 60 ]; then
      echo "Skipping activity this run"
      exit 0
    fi

    git config --global user.name "Matthew Adlaird"
    git config --global user.email "YOUR_GITHUB_EMAIL"

    MESSAGES=(
      "update docs"
      "minor fix"
      "refactor"
      "cleanup"
      "maintenance"
      "small improvement"
    )

    MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

    # Always ensure file changes
    echo "$(date +%s)" > activity.log

    git add activity.log

    # Only commit if there are changes
    if git diff --cached --quiet; then
      echo "No changes to commit"
      exit 0
    fi

    git commit -m "$MSG"

    # Push safely
    git push || echo "Push failed (probably no changes)"
